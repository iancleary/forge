name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build Release Artifact
        id: artifact
        shell: bash
        run: |
          scripts/build-forge-release-artifact.sh \
            --version "${{ github.event.release.tag_name }}" \
            --target "${{ matrix.target }}" \
            --output-dir dist
          echo "name=forge-${{ github.event.release.tag_name }}-${{ matrix.target }}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Attest Release Artifact
        id: attest_artifact
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ steps.artifact.outputs.name }}
      - name: Save Artifact Attestation Bundle
        shell: bash
        run: |
          cp \
            "${{ steps.attest_artifact.outputs.bundle-path }}" \
            "dist/${{ steps.artifact.outputs.name }}.attestation.json"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Build Release Manifest
        shell: bash
        run: |
          scripts/build-forge-release-manifest.sh \
            --version "${{ github.event.release.tag_name }}" \
            --artifacts-dir dist
      - name: Attest Release Metadata
        id: attest_metadata
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/forge-release-manifest.json
            dist/forge-release-sha256sums.txt
      - name: Save Metadata Attestation Bundle
        shell: bash
        run: |
          cp \
            "${{ steps.attest_metadata.outputs.bundle-path }}" \
            dist/forge-release-metadata.attestation.json
      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.tar.gz \
            dist/*.attestation.json \
            dist/forge-release-manifest.json \
            dist/forge-release-sha256sums.txt \
            --clobber

      - name: Verify attestation visibility for published assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for target in x86_64-unknown-linux-gnu aarch64-apple-darwin; do
            asset_name="forge-${{ github.event.release.tag_name }}-${target}.tar.gz"
            source_ref="refs/tags/${{ github.event.release.tag_name }}"
            if [ ! -f "dist/$asset_name" ]; then
              echo "missing release asset for verification: dist/$asset_name"
              exit 1
            fi
            for attempt in 1 2 3; do
              if gh attestation verify "dist/$asset_name" \
                --repo "${{ github.repository }}" \
                --source-ref "$source_ref" \
                --signer-workflow "${{ github.repository }}/.github/workflows/release-artifacts.yml" \
                --predicate-type https://slsa.dev/provenance/v1; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "failed to verify attestation for dist/$asset_name"
                exit 1
              fi
              sleep "$((attempt * 2))"
            done
          done
